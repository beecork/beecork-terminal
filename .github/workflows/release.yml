name: Release

# Cut a release by bumping the version in ALL THREE files, then tagging:
#   package.json + src-tauri/tauri.conf.json + src-tauri/Cargo.toml  (Tauri uses
#   tauri.conf.json for the bundle + updater — npm version alone is NOT enough),
#   then: git commit -am vX.Y.Z && git tag vX.Y.Z && git push --follow-tags
# The tag (vX.Y.Z) triggers tests + dependency audits, then a matrix build on
# mac/win/linux that publishes a GitHub Release with the installers and the
# signed updater manifest (latest.json). See RELEASING.md "Cutting a release".

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # Gate: run tests + dependency audits before anything is built and published.
  checks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      # The updater manifest (latest.json) advertises the version from
      # tauri.conf.json, NOT the git tag — so a tag that doesn't match it would
      # publish a release that installed clients never see as an update. Fail
      # fast if they disagree. (Skipped on manual workflow_dispatch, non-tag ref.)
      - name: Verify tag matches tauri.conf.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          CONF=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$CONF" != "$TAG" ]; then
            echo "::error::git tag $GITHUB_REF_NAME != tauri.conf.json version $CONF — bump all three (package.json, src-tauri/tauri.conf.json, src-tauri/Cargo.toml)"
            exit 1
          fi
          echo "version OK: $CONF"
      # `cargo test` compiles the Tauri crate, which needs the WebKitGTK/glib
      # system libs on Linux (same set the release job installs for its ubuntu leg).
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev
      - name: Install frontend dependencies
        run: npm ci
      - name: Frontend tests
        run: npm test
      - name: Rust tests
        run: cd src-tauri && cargo test
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      - name: Audit Rust dependencies
        # Blocking: fails on any new advisory. A short, justified ignore-list for
        # unfixable transitive advisories lives in src-tauri/.cargo/audit.toml.
        run: |
          cargo install cargo-audit --locked
          cd src-tauri && cargo audit

  release:
    needs: checks
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            target: ""
            args: ""
          - platform: windows-latest
            target: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---- macOS code signing + notarization (see RELEASING.md) ----
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ---- Tauri auto-updater signing (REQUIRED — createUpdaterArtifacts is on;
          #      never regenerate this key or installed apps can't verify updates. See RELEASING.md §3) ----
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Beecork Terminal ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below. See the assets."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
